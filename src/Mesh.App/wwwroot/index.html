<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mesh</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="lib/bootstrap-icons/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Mesh.App.styles.css" />
    <link rel="icon" href="data:,">
    <style>
        /* Boot splash shown before Blazor mounts, then replaced automatically. */
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
        #app {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        .app-splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            height: 100%;
            background: #f6f8fb;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }
        .app-splash .splash-art {
            width: 320px;
            max-width: 62vw;
            height: auto;
            animation: splash-breathe 2.2s ease-in-out infinite;
        }
        .app-splash .splash-caption {
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #5b6472;
            opacity: 0.85;
        }
        @keyframes splash-breathe {
            0%, 100% { transform: scale(1); opacity: 0.94; }
            50% { transform: scale(1.03); opacity: 1; }
        }
    </style>
</head>

<body>

    <div id="app">
        <div class="app-splash">
            <img src="logo-text.png" alt="Mesh" class="splash-art" onerror="this.style.display='none'" />
            <div class="splash-caption">Connecting your mesh...</div>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="js/mesh-ui.js"></script>
    <script src="js/sandboxframe.js"></script>
    <script src="js/paste.js"></script>

</body>

</html>
